<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Targenix.uz — Facebook Lead Ads Integration Platform</title>
    <meta name="description" content="Connect your Facebook Lead Ads to any platform. Every lead captured, routed, and delivered in real time — automatically." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>

    <!-- Facebook JS SDK — required for Facebook Login popup -->
    <script>
      window.fbAsyncInit = function () {
        FB.init({
          appId: "%VITE_FACEBOOK_APP_ID%",
          cookie: false,
          xfbml: false,
          version: "v21.0",
        });
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
  </body>

</html>
